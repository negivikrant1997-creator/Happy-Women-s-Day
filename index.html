<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poster Generator</title>

<style>
body{
margin:0;
font-family:system-ui,Arial;
background:#120028;
color:#fff;
}

.bar{
display:flex;
gap:10px;
padding:12px;
flex-wrap:wrap;
align-items:center;
justify-content:center;
}

input[type="text"],button{
font-size:16px;
padding:10px;
border:none;
border-radius:10px;
background:#2f085a;
color:#fff;
}

.btn{
background:#ffa500;
color:#230044;
font-weight:700;
}

.stage{
display:grid;
place-items:center;
padding:10px;
}

canvas{
width:min(94vw,420px);
height:calc(min(94vw,420px)*1920/1080);
border-radius:14px;
background:#0d001a;
box-shadow:0 8px 24px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<div class="bar">

<button class="btn" id="btnCamera">Take Photo</button>

<button class="btn" id="btnGallery">Upload From Gallery</button>

<input id="inputCamera" type="file" accept="image/*" capture="environment" style="display:none">

<input id="inputGallery" type="file" accept="image/*" style="display:none">

<label>
Name
<input id="nameInput" type="text" placeholder="Type name (optional)">
</label>

<button class="btn" id="saveBtn">Download</button>

</div>

<div class="stage">
<canvas id="cv" width="1080" height="1920"></canvas>
</div>

<script>
(() => {

const W = 1080
const H = 1920

const CX = 540
const CY = 960
const R = 260

const NAME_Y = CY + R + 90
const NAME_FONT_PX = 60

const cv = document.getElementById("cv")
const ctx = cv.getContext("2d")

const btnCamera = document.getElementById("btnCamera")
const btnGallery = document.getElementById("btnGallery")
const inputCamera = document.getElementById("inputCamera")
const inputGallery = document.getElementById("inputGallery")
const nameInput = document.getElementById("nameInput")
const saveBtn = document.getElementById("saveBtn")

let posterImg = null
let photoImg = null

function loadImage(src){
return new Promise((res,rej)=>{
const i = new Image()
i.onload = () => res(i)
i.onerror = () => rej()
i.src = src
})
}

function autoNameFromFile(file){
if(!file) return ""

const base = file.name
.replace(/\.[^.]+$/,"")
.replace(/[_-]+/g," ")
.trim()

return base.split(" ")
.map(w => w ? w[0].toUpperCase()+w.slice(1) : "")
.join(" ")
}

async function initPoster(){
posterImg = await loadImage("3.png")
draw()
}

function draw(){

if(posterImg)
ctx.drawImage(posterImg,0,0,W,H)

if(photoImg){

ctx.save()

ctx.beginPath()
ctx.rect(CX-R,CY-R,2*R,2*R)
ctx.closePath()
ctx.clip()

const bw = 2*R
const bh = 2*R

const a = photoImg.width/photoImg.height
const ab = bw/bh

let dw,dh

if(a>ab){
dh = bh
dw = dh*a
}
else{
dw = bw
dh = dw/a
}

ctx.drawImage(photoImg,CX-dw/2,CY-dh/2,dw,dh)

ctx.restore()

}

ctx.lineWidth = 8
ctx.strokeStyle = "#E0B0FF"
ctx.strokeRect(CX-R,CY-R,2*R,2*R)

const name = (nameInput.value||"").trim()

if(name){

ctx.font = `800 ${NAME_FONT_PX}px Arial`
ctx.fillStyle = "#7A1F7A"
ctx.textAlign = "center"
ctx.textBaseline = "middle"

ctx.shadowColor = "rgba(0,0,0,0.55)"
ctx.shadowBlur = 10

ctx.fillText(name,W/2,NAME_Y)

ctx.shadowBlur = 0

}

}

btnCamera.onclick = () => inputCamera.click()
btnGallery.onclick = () => inputGallery.click()

function handleFile(file){

if(!file){
photoImg = null
draw()
return
}

const r = new FileReader()

r.onload = async e => {

photoImg = await loadImage(e.target.result)

if(!nameInput.value)
nameInput.value = autoNameFromFile(file)

draw()

}

r.readAsDataURL(file)

}

inputCamera.onchange = () => handleFile(inputCamera.files[0])
inputGallery.onchange = () => handleFile(inputGallery.files[0])

nameInput.oninput = draw

saveBtn.onclick = () => {

const a = document.createElement("a")

const who = (nameInput.value||"user").replace(/\s+/g,"_")

a.download = `poster_${who}.png`

a.href = cv.toDataURL("image/png")

a.click()

}

initPoster()

})()
</script>

</body>
</html>
